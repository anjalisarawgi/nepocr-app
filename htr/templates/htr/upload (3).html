<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — nepOCR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: serif;
      background: #f7f6f3;
      min-height: 100vh;
      color: #1a1a1a;
    }

    /* ── Nav ── */
    nav {
      background: #ffffff;
      border-bottom: 0.5px solid #D0CCC4;
      padding: 0 28px;
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 10px;
    }

    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .nav-logo {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }

    .nav-sub {
      font-size: 11px;
      color: #9B978F;
      letter-spacing: 0.4px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-actions a {
      font-size: 13px;
      color: #8A8680;
      text-decoration: none;
    }

    .nav-actions a:hover { color: #1a1a1a; }

    .btn-logout {
      font-size: 13px;
      color: #8A8680;
      padding: 4px 12px;
      border: 0.5px solid #D0CCC4;
      border-radius: 6px;
      background: none;
      cursor: pointer;
      font-family: serif;
      text-decoration: none;
    }

    .btn-logout:hover {
      color: #1a1a1a;
      border-color: #B0ABA3;
    }

    /* ── Tabs ── */
    .nav-tabs {
      display: flex;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      color: #8A8680;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.1s;
    }

    .tab:hover { color: #1a1a1a; }

    .tab.active {
      color: #1a1a1a;
      font-weight: 500;
      border-bottom-color: #f5ba24;
    }

    .tab.disabled {
      color: #C8C6C4;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Page ── */
    .page {
      padding: 32px 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      max-width: 960px;
    }

    /* ── Preview card ── */
    .preview-card {
      background: #ffffff;
      border: 0.5px solid #D0CCC4;
      border-radius: 10px;
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .preview-card.has-image {
      padding: 0;
      align-items: stretch;
      justify-content: stretch;
    }

    .preview-placeholder-icon {
      width: 36px;
      height: 36px;
      color: #C8C6C4;
    }

    .preview-placeholder-text {
      font-size: 13px;
      color: #C8C6C4;
    }

    #preview-img {
      display: none;
      width: 100%;
      height: 100%;
      min-height: 340px;
      object-fit: cover;
      border-radius: 9px;
    }

    /* ── Upload column ── */
    .upload-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Drop zones ── */
    .drop-zone {
      border: 1.5px dashed #C8C6C4;
      border-radius: 10px;
      background: #ffffff;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex: 1;
    }

    .drop-zone:hover {
      border-color: #8A8680;
      background: #fafaf8;
    }

    .drop-zone label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 36px 24px;
      cursor: pointer;
      width: 100%;
      height: 100%;
      min-height: 148px;
    }

    .drop-zone svg {
      color: #C8C6C4;
      transition: color 0.15s;
    }

    .drop-zone:hover svg { color: #8A8680; }

    .drop-label {
      font-size: 13px;
      color: #1a1a1a;
    }

    .drop-label u { text-underline-offset: 2px; }

    .drop-hint {
      font-size: 12px;
      color: #B0ABA3;
    }

    /* Selected state */
    .drop-zone.has-file {
      border-style: solid;
      border-color: #7cba8a;
      background: #f4fbf5;
    }

    .drop-zone.has-file svg { color: #4a9c5a; }
    .drop-zone.has-file .drop-hint { color: #4a9c5a; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 10px 0;
      background: #1a1a1a;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: serif;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 2px;
    }

    .btn-submit:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-submit:not(:disabled):hover { opacity: 0.82; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-top">
      <div class="nav-brand">
        <span class="nav-logo">nepOCR</span>
        <span class="nav-sub">Old Nepali manuscript HTR</span>
      </div>
      <div class="nav-actions">
        <a href="{% url 'history' %}">History</a>
        <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
      </div>
    </div>

    <div class="nav-tabs">
      <a href="{% url 'upload' %}" class="tab active">Upload</a>

      {% if current_pk %}
        <a href="{% url 'preprocess' current_pk %}" class="tab">Preprocess</a>
      {% else %}
        <span class="tab disabled">Preprocess</span>
      {% endif %}

      <a href="{% url 'segment' %}" class="tab">Segmentation</a>
      <a href="{% url 'run_ocr' %}" class="tab">Run OCR</a>
      <a href="{% url 'export' %}" class="tab">Export</a>
    </div>
  </nav>

  <div class="page">
    <div class="grid">

      <!-- Preview -->
      <div class="preview-card">
        <svg class="preview-placeholder-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="preview-placeholder-text">No image selected</span>
        <img id="preview-img" alt="Preview">
      </div>

      <!-- Upload form -->
      <form method="POST" enctype="multipart/form-data" class="upload-col">
        {% csrf_token %}

        <!-- Image drop zone -->
        <div class="drop-zone" id="img-zone">
          <label for="file-input">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="7 9 12 4 17 9"/><line x1="12" y1="4" x2="12" y2="16"/>
            </svg>
            <span class="drop-label"><u>Choose image</u> or drag &amp; drop</span>
            <span class="drop-hint" id="img-hint">JPG, PNG, TIFF accepted</span>
            <input id="file-input" name="image" type="file" accept="image/*" style="display:none;">
          </label>
        </div>

        <!-- XML drop zone -->
        <div class="drop-zone" id="xml-zone">
          <label for="xml-input">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <span class="drop-label"><u>Choose XML</u> or drag &amp; drop</span>
            <span class="drop-hint" id="xml-hint">PAGE XML layout file (optional)</span>
            <input id="xml-input" name="xml" type="file" accept=".xml" style="display:none;">
          </label>
        </div>

        <button class="btn-submit" id="submit-btn" type="submit" disabled>
          Upload &amp; continue →
        </button>
      </form>

    </div>
  </div>

  <script>
    const fileInput  = document.getElementById('file-input');
    const xmlInput   = document.getElementById('xml-input');
    const previewImg = document.getElementById('preview-img');
    const imgZone    = document.getElementById('img-zone');
    const xmlZone    = document.getElementById('xml-zone');
    const submitBtn  = document.getElementById('submit-btn');
    const imgHint    = document.getElementById('img-hint');
    const xmlHint    = document.getElementById('xml-hint');
    const placeholder = document.querySelector('.preview-placeholder-icon');
    const placeholderText = document.querySelector('.preview-placeholder-text');

    fileInput.addEventListener('change', function () {
      if (!this.files[0]) return;
      previewImg.src = URL.createObjectURL(this.files[0]);
      previewImg.style.display = 'block';
      placeholder.style.display = 'none';
      placeholderText.style.display = 'none';
      document.querySelector('.preview-card').classList.add('has-image');
      imgHint.textContent = this.files[0].name;
      imgZone.classList.add('has-file');
      submitBtn.disabled = false;
    });

    xmlInput.addEventListener('change', function () {
      if (!this.files[0]) return;
      xmlHint.textContent = this.files[0].name;
      xmlZone.classList.add('has-file');
    });

    // Drag & drop
    [imgZone, xmlZone].forEach(zone => {
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#8A8680'; });
      zone.addEventListener('dragleave', () => { if (!zone.classList.contains('has-file')) zone.style.borderColor = ''; });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.style.borderColor = '';
        const input = zone.querySelector('input[type=file]');
        if (e.dataTransfer.files.length) {
          const dt = new DataTransfer();
          dt.items.add(e.dataTransfer.files[0]);
          input.files = dt.files;
          input.dispatchEvent(new Event('change'));
        }
      });
    });
  </script>

</body>
</html>
