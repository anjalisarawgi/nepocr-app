<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>
        .container {
            display: flex;
            gap: 40px;
            padding: 20px;
        }
        .column {
            flex: 1;
            text-align: center;
        }
        img {
            width: 100%;
            max-width: 500px;
            cursor: zoom-in;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'upload' %}">Upload</a>
        <a href="{% url 'history' %}">History</a>
        <a href="{% url 'logout' %}">Logout</a>
    </nav>

    <h1> Result </h1>
    <div class="container">
        <div class="column">
            <h3> Original image</h3>
            <img src="{{ instance.original_image.url }}" alt="Original Image" onclick="openLightbox(this)" />
        </div>
        <div class="column">
            <h3>Cleaned image</h3>
            <img src="{{ instance.processed.url }}" alt="Processed Image" onclick="openLightbox(this)"/>
        </div>
    </div>

    <br>
    <a href="/"> Upload another image </a>

</body>
</html>
