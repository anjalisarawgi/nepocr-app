<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <title>Preprocess — Old Nepali HTR</title> -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #FFFFFF;
      --ink:          #161616;
      --ink-soft:     #757575;
      --ink-faint:    #ABABAB;
      --accent:       #A8512E;
      --accent-soft:  #F3E6DF;
      --success:      #4C7A52;
      --success-soft: #E7F0E6;
      --line:         #ECECEC;
      --line-strong:  #DCDCDC;

      --serif: 'Source Serif 4', serif;
      --sans:  'Inter', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      min-height: 100vh;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Nav ---------- */
    nav { padding: 0 40px; }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 8px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .nav-brand { display: flex; align-items: baseline; gap: 9px; }
    .nav-logo {
      font-family: var(--serif);
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.2px;
    }
    .nav-sub { font-size: 12.5px; font-weight: 500; color: var(--accent); }

    .nav-actions { display: flex; align-items: center; gap: 20px; }
    .nav-actions a { font-size: 13.5px; color: var(--ink-soft); text-decoration: none; }
    .nav-actions a:hover { color: var(--ink); }

    .btn-logout {
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-soft);
      padding: 7px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: none; cursor: pointer; text-decoration: none;
    }
    .btn-logout:hover { color: var(--ink); border-color: var(--ink-faint); }

    /* ---------- Step indicator ---------- */
    .steps {
      display: flex;
      align-items: center;
      max-width: 600px;
      padding: 36px 0 44px;
      margin: 0 auto;
    }

    .step {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      text-decoration: none;
    }

    .step-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      background: var(--bg);
      border: 1.5px solid var(--line-strong);
      color: var(--ink-faint);
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .step-label {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      color: var(--ink-faint);
      transition: color 0.15s;
    }

    .step.done .step-circle,
    .step.active .step-circle {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--bg);
    }

    .step.active .step-circle { box-shadow: 0 0 0 4px var(--line); }

    .step.done .step-label,
    .step.active .step-label { color: var(--ink); }
    .step.active .step-label { font-weight: 600; }

    .step.upcoming { cursor: default; pointer-events: none; }

    .step-line {
      flex: 1 1 60px;
      height: 1.5px;
      background: var(--line);
      margin: 0 4px;
    }
    .step-line.done { background: var(--ink); }

    /* ---------- Page ---------- */
    .page { padding: 4px 40px 56px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      align-items: start;
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Preview — same slot as the upload page */
    .preview-card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
    }

    /* ---------- Preview header / integrated toolbar ---------- */
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 11px 12px 11px 18px;
      border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .preview-header-text { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .preview-header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
    }
    .preview-header-meta {
      font-size: 12px;
      color: var(--ink-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 0 0 auto;
    }

    .tb-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 7px;
      background: none;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      flex: 0 0 auto;
    }
    .tb-btn svg { width: 16px; height: 16px; }
    .tb-btn:hover:not(:disabled) { background: var(--line); color: var(--ink); }
    .tb-btn:active:not(:disabled) { background: var(--line-strong); }
    .tb-btn:disabled { opacity: 0.35; cursor: default; }

    .tb-btn.tb-toggle.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .tb-zoom-readout {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      width: 42px;
      text-align: center;
      flex: 0 0 auto;
      font-variant-numeric: tabular-nums;
    }

    .tb-sep {
      width: 1px;
      height: 18px;
      background: var(--line-strong);
      margin: 0 6px;
      flex: 0 0 auto;
    }

    .preview-body {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      background: #FAFAFA;
      padding: 20px;
    }

    #preview-img {
      display: block;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      vertical-align: top;
      filter: var(--preview-filter, none);
      transform: scale(var(--zoom-scale, 1));
      transform-origin: center center;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .preview-card.is-fullscreen {
      border-radius: 0;
      min-height: 100vh;
    }
    .preview-card.is-fullscreen .preview-body { background: #1B1B1B; }

    /* ---------- Options column ---------- */
    .options-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .options-heading {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
    }
    .options-subtext {
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: -8px;
      margin-bottom: 4px;
    }

    .option-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .option-card:hover { border-color: var(--ink-faint); background: #FAFAFA; }

    .option-card.checked {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .checkbox-box {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 1.5px solid var(--line-strong);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      margin-top: 1px;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-card.checked .checkbox-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox-box svg {
      width: 12px; height: 12px;
      color: var(--bg);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.12s, transform 0.12s;
    }
    .option-card.checked .checkbox-box svg { opacity: 1; transform: scale(1); }

    .option-text { display: flex; flex-direction: column; gap: 3px; }
    .option-title { font-size: 14.5px; font-weight: 600; color: var(--ink); }
    .option-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.45; }

    .option-card input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .btn-submit {
      width: 100%; padding: 14px 0;
      background: var(--ink); color: var(--bg);
      border: none; border-radius: 10px;
      font-family: var(--sans);
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: var(--accent); }

    .btn-back {
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      text-decoration: none;
      margin-top: 2px;
    }
    .btn-back:hover { color: var(--ink); }

    /* ---------- Narrow viewports: wrap toolbar to its own row ---------- */
    @media (max-width: 640px) {
      .preview-header {
        flex-wrap: wrap;
        row-gap: 10px;
      }
      .preview-header-text { flex: 1 1 100%; }
      .viewer-toolbar {
        flex: 1 1 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-top">
      <div class="nav-brand">
        <span class="nav-logo">Old Nepali HTR</span>
        <span class="nav-sub">·&nbsp; Manuscript Transcription</span>
      </div>
      <div class="nav-actions">
        <a href="{% url 'history' %}">History</a>
        <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
      </div>
    </div>

    <div class="steps">
      <a href="{% url 'upload' %}" class="step done">
        <span class="step-circle">✓</span>
        <span class="step-label">Upload</span>
      </a>
      <span class="step-line done"></span>

      <a href="{% url 'preprocess' current_pk %}" class="step active">
        <span class="step-circle">2</span>
        <span class="step-label">Preprocess</span>
      </a>
      <span class="step-line"></span>

      <a href="{% url 'segment' %}" class="step upcoming">
        <span class="step-circle">3</span>
        <span class="step-label">Segmentation</span>
      </a>
      <span class="step-line"></span>

      <a href="{% url 'run_ocr' %}" class="step upcoming">
        <span class="step-circle">4</span>
        <span class="step-label">Run OCR</span>
      </a>
      <span class="step-line"></span>

      <a href="{% url 'export' %}" class="step upcoming">
        <span class="step-circle">5</span>
        <span class="step-label">Export</span>
      </a>
    </div>
  </nav>

  <div class="page">
    <div class="grid">

      <div class="preview-card" id="preview-card">
        <div class="preview-header">
          <div class="preview-header-text">
            <span class="preview-header-title">Original scan</span>
            <span class="preview-header-meta">Uploaded {{ instance.uploaded_at|date:"M d, Y" }}</span>
          </div>

          <div class="viewer-toolbar">
            <button type="button" class="tb-btn" id="zoom-out-btn" title="Zoom out" aria-label="Zoom out">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </button>
            <span class="tb-zoom-readout" id="zoom-readout">100%</span>
            <button type="button" class="tb-btn" id="zoom-in-btn" title="Zoom in" aria-label="Zoom in">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </button>

            <span class="tb-sep"></span>

            <button type="button" class="tb-btn" id="reset-btn" title="Reset view" aria-label="Reset view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
              </svg>
            </button>
            <button type="button" class="tb-btn tb-toggle" id="crop-btn" title="Crop" aria-label="Crop">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/>
              </svg>
            </button>
            <button type="button" class="tb-btn" id="fullscreen-btn" title="Fullscreen" aria-label="Fullscreen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="preview-body">
          <img id="preview-img" src="{{ instance.original_image.url }}" alt="Uploaded manuscript page">
        </div>
      </div>

      <form method="POST" class="options-col" id="preprocess-form">
        {% csrf_token %}

        <span class="options-heading">Preprocessing</span>

        <label class="option-card" id="gaussian-card" for="gaussian-checkbox">
          <input type="checkbox" name="gaussian_normalization" id="gaussian-checkbox">
          <span class="checkbox-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
          <span class="option-text">
            <span class="option-title">Gaussian normalization</span>
            <span class="option-desc">Smooths uneven lighting and background noise before segmentation.</span>
          </span>
        </label>

        <button class="btn-submit" type="submit">
          Continue to segmentation →
        </button>
        <a href="{% url 'upload' %}" class="btn-back">← Back to upload</a>
      </form>

    </div>
  </div>

  <script>
    const card     = document.getElementById('gaussian-card');
    const checkbox = document.getElementById('gaussian-checkbox');
    const preview  = document.getElementById('preview-img');

    function syncState() {
      card.classList.toggle('checked', checkbox.checked);
      // Live preview hint: subtle blur stands in for the smoothing effect.
      preview.style.filter = checkbox.checked ? 'contrast(1.04) saturate(0.97)' : 'none';
    }

    checkbox.addEventListener('change', syncState);
    syncState();

    // ---------- Integrated viewer toolbar ----------
    const previewCard   = document.getElementById('preview-card');
    const zoomReadout    = document.getElementById('zoom-readout');
    const zoomOutBtn     = document.getElementById('zoom-out-btn');
    const zoomInBtn      = document.getElementById('zoom-in-btn');
    const resetBtn       = document.getElementById('reset-btn');
    const cropBtn        = document.getElementById('crop-btn');
    const fullscreenBtn  = document.getElementById('fullscreen-btn');

    const ZOOM_MIN = 0.5, ZOOM_MAX = 2.5, ZOOM_STEP = 0.1;
    let zoom = 1;

    function applyZoom() {
      previewCard.style.setProperty('--zoom-scale', zoom.toFixed(2));
      zoomReadout.textContent = Math.round(zoom * 100) + '%';
      zoomOutBtn.disabled = zoom <= ZOOM_MIN + 1e-6;
      zoomInBtn.disabled  = zoom >= ZOOM_MAX - 1e-6;
    }

    zoomOutBtn.addEventListener('click', () => {
      zoom = Math.max(ZOOM_MIN, +(zoom - ZOOM_STEP).toFixed(2));
      applyZoom();
    });
    zoomInBtn.addEventListener('click', () => {
      zoom = Math.min(ZOOM_MAX, +(zoom + ZOOM_STEP).toFixed(2));
      applyZoom();
    });
    resetBtn.addEventListener('click', () => {
      zoom = 1;
      applyZoom();
    });

    cropBtn.addEventListener('click', () => {
      cropBtn.classList.toggle('active');
      // Hook actual crop-mode logic here; this just reflects toggle state for now.
    });

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        previewCard.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      previewCard.classList.toggle('is-fullscreen', document.fullscreenElement === previewCard);
    });

    applyZoom();
  </script>

</body>
</html>
