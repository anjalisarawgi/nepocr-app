<!DOCTYPE html>
<html>
<head>
  <title>NepOCR — Run OCR</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }
  </style>
  
</head>
<body style="margin:0; font-family:'Inter', sans-serif; background:#fff;">

    <nav style="background:#F2F0EE; border-bottom: 0.5px solid #DAD8D5; padding: 0 24px; font-family:'Inter', sans-serif;">
        <div style="display:flex; align-items:center; justify-content:space-between; padding: 14px 0 10px;">
          <div style="display:flex; align-items:baseline; gap:12px;">
            <div style="font-size:22px; font-weight:500; font-family:'EB Garamond', serif; color:#2D131B;">NepOCR</div>
            <div style="font-size:11px; color:#A09E9C; font-family:'Inter', sans-serif; letter-spacing:0.6px;">Old Nepali manuscript HTR</div>
          </div>
          <div style="display:flex; align-items:center; gap:20px;">
            <a href="{% url 'history' %}" style="font-size:13px; color:#787470; text-decoration:none;">History</a>
            <a href="{% url 'logout' %}" style="font-size:13px; color:#787470; text-decoration:none; padding:5px 12px; border:0.5px solid #DAD8D5; border-radius:4px;">Logout</a>
          </div>
        </div>
        <div style="display:flex; border-top: 0.5px solid #DAD8D5;">
          <a href="{% url 'upload' %}" style="padding:10px 20px; font-size:13px; color:#2D131B; font-weight:500; text-decoration:none; border-bottom:2px solid #2D131B;">Upload</a>
    
          {% if current_pk %}
            <a href="{% url 'preprocess' current_pk %}" style="padding:10px 20px; font-size:13px; color:#A09E9C; text-decoration:none; border-bottom:2px solid transparent;">Preprocess</a>
          {% else %}
            <a style="padding:10px 20px; font-size:13px; color:#C8C6C4; border-bottom:2px solid transparent; cursor:not-allowed;">Preprocess</a>
          {% endif %}
          <a href="{% url 'segment' %}" style="padding:10px 20px; font-size:13px; color:#A09E9C; text-decoration:none; border-bottom:2px solid transparent;">Segmentation</a>
          <a href="{% url 'run_ocr' %}" style="padding:10px 20px; font-size:13px; color:#A09E9C; text-decoration:none; border-bottom:2px solid transparent;">Run OCR</a>
          <a href="{% url 'export' %}" style="padding:10px 20px; font-size:13px; color:#A09E9C; text-decoration:none; border-bottom:2px solid transparent;">Export</a>
        </div>
      </nav>
    
    

  <div style="max-width:600px; margin:80px auto; text-align:center; padding: 0 24px;">
    <div style="font-family:'EB Garamond', serif; font-size:28px; color:#2D131B; margin-bottom:10px;">Run OCR</div>
    <div style="font-size:13px; color:#A09E9C;">This feature is coming soon.</div>
  </div>

</body>
</html>
